version: '3.9'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app1
      - app2
    restart: always
    networks:
      - openclaw-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 应用实例 1
  app1:
    image: openclaw-browser-mcp:1.0.0
    container_name: openclaw-app1
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - ENVIRONMENT=production
      - DEBUG=False
      - LOG_LEVEL=INFO
      - BROWSER_TIMEOUT=30000
      - MAX_SESSIONS=5
      - CAPTCHA_PROVIDER=2captcha
      - CAPTCHA_API_KEY=${CAPTCHA_API_KEY}
    volumes:
      - ./logs/app1:/app/logs
    restart: always
    networks:
      - openclaw-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 应用实例 2
  app2:
    image: openclaw-browser-mcp:1.0.0
    container_name: openclaw-app2
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8001
      - ENVIRONMENT=production
      - DEBUG=False
      - LOG_LEVEL=INFO
      - BROWSER_TIMEOUT=30000
      - MAX_SESSIONS=5
      - CAPTCHA_PROVIDER=2captcha
      - CAPTCHA_API_KEY=${CAPTCHA_API_KEY}
    volumes:
      - ./logs/app2:/app/logs
    restart: always
    networks:
      - openclaw-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - openclaw-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  openclaw-network:
    driver: bridge

volumes:
  redis-data: